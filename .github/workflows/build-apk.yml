name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.0.0'

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Rename APK
        run: mkdir -p output && cp app/build/outputs/apk/debug/app-debug.apk output/Video-Folders-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Video-Folders-debug-apk
          path: output/Video-Folders-debug.apk
