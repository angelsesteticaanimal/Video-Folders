name: Android CI - build debug APK

on:
  push:
    branches: [ add/audio-crossfade, main ]
  pull_request:
    branches: [ main ]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.10.6'
          cache: true

      - name: Ensure Flutter project scaffolding
        run: |
          if [ ! -d "android" ]; then
            flutter create --org com.angelsesteticaanimal .
          fi

      - name: Get dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
